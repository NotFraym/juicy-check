server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Routing SPA : renvoie index.html pour toutes les routes React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets compilés (JS/CSS/images)
    location ~* \.(js|css|png|jpg|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}